name: Plate Image Cropper

on:
  workflow_dispatch: # 允許在 GitHub Actions 頁面手動觸發

jobs:
  process-image:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy Pillow pillow-heif

      - name: 🖼️ 執行裁切腳本
        # 這裡假設你的專案根目錄有一張 IMG_1450.HEIC 且腳本名為 crop_plate.py
        run: python crop_plate.py

      - name: 📤 上傳裁切後的結果
        uses: actions/upload-artifact@v4
        with:
          name: cropped-image-result
          path: cropped_plate.jpg
          if-no-files-found: warn